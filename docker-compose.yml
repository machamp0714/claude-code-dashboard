services:
  otelcol:
    image: ${OTELCOL_IMAGE}
    container_name: cc-otelcol
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otelcol/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "127.0.0.1:${OTLP_GRPC_PORT}:4317"
      - "127.0.0.1:${OTLP_HTTP_PORT}:4318"
      - "127.0.0.1:${OTELCOL_METRICS_PORT}:8889"
      - "127.0.0.1:${OTELCOL_HEALTH_PORT}:13133"
    # NOTE: otel/opentelemetry-collector-contrib イメージは distroless で
    # wget/sh 等のバイナリを一切含まないため、exec 形式の docker healthcheck
    # (CMD wget ...) は実行不可（unhealthy 固定になる）。health_check
    # extension の疎通はホスト側から `curl :13133` で確認する（Step 5）。
    depends_on:
      loki:
        condition: service_healthy

  prometheus:
    image: ${PROMETHEUS_IMAGE}
    container_name: cc-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION}"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT}:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      otelcol:
        condition: service_started

  loki:
    image: ${LOKI_IMAGE}
    container_name: cc-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - ./data/loki:/loki
    ports:
      - "127.0.0.1:${LOKI_PORT}:3100"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 5

  grafana:
    image: ${GRAFANA_IMAGE}
    container_name: cc-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_DEFAULT_THEME=dark
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./data/grafana:/var/lib/grafana
    ports:
      - "127.0.0.1:${GRAFANA_PORT}:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
