services:
  otelcol:
    image: ${OTELCOL_IMAGE}
    container_name: cc-otelcol
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otelcol/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "${OTLP_GRPC_PORT}:4317"
      - "${OTLP_HTTP_PORT}:4318"
      - "${OTELCOL_METRICS_PORT}:8889"
      - "${OTELCOL_HEALTH_PORT}:13133"
    # NOTE: otel/opentelemetry-collector-contrib イメージは distroless で
    # wget/sh 等のバイナリを一切含まないため、exec 形式の docker healthcheck
    # (CMD wget ...) は実行不可（unhealthy 固定になる）。health_check
    # extension の疎通はホスト側から `curl :13133` で確認する（Step 5）。
    depends_on:
      loki:
        condition: service_started

  prometheus:
    image: ${PROMETHEUS_IMAGE}
    container_name: cc-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION}"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    depends_on:
      otelcol:
        condition: service_started

  loki:
    image: ${LOKI_IMAGE}
    container_name: cc-loki
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "${LOKI_PORT}:3100"

  grafana:
    image: ${GRAFANA_IMAGE}
    container_name: cc-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_DEFAULT_THEME=dark
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    depends_on:
      - prometheus
      - loki

volumes:
  prometheus-data:
  loki-data:
  grafana-data:
